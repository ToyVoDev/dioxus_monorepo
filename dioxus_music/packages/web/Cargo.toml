[package]
name = "dioxus_music_web"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { workspace = true, optional = true }
dioxus = { workspace = true, features = ["router", "fullstack"] }
dioxus-logger = { workspace = true }
dioxus_music_api = { workspace = true }
dioxus_music_ui = { workspace = true }
kinetic_ui = { workspace = true }
dotenvy = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4", "js"] }
dirs = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { workspace = true, features = ["Window", "Location"] }

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "dioxus_music_ui/server", "dioxus_music_api/server", "dep:dotenvy", "dep:axum", "dep:tokio", "dep:dirs"]
