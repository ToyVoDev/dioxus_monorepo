[package]
name = "dioxus_music_mobile"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
dioxus-logger = { workspace = true }
dioxus_music_ui = { workspace = true }
kinetic_ui = { workspace = true }
tracing = { workspace = true }

[features]
default = []
mobile = ["dioxus/mobile"]
server = ["dioxus/server", "dioxus_music_ui/server"]
