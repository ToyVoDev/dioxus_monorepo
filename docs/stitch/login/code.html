<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | KINETIC_OBSIDIAN</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131313;
        }
        h1, h2, h3, .font-headline {
            font-family: 'Space_Grotesk', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed-variant": "#5c4300",
                      "surface-tint": "#ffb3ad",
                      "tertiary-fixed-dim": "#f9bd22",
                      "secondary-container": "#03c6b2",
                      "surface-container-high": "#2a2a2a",
                      "on-tertiary": "#402d00",
                      "on-surface": "#e4e2e1",
                      "error-container": "#93000a",
                      "surface-container-lowest": "#0e0e0e",
                      "secondary-fixed-dim": "#3cddc7",
                      "inverse-on-surface": "#303030",
                      "surface": "#131313",
                      "surface-dim": "#131313",
                      "primary-container": "#ff5451",
                      "surface-variant": "#353535",
                      "on-tertiary-container": "#372700",
                      "on-primary": "#68000a",
                      "tertiary-container": "#b88900",
                      "inverse-surface": "#e4e2e1",
                      "on-surface-variant": "#e4beba",
                      "inverse-primary": "#b91a24",
                      "on-primary-fixed": "#410004",
                      "on-secondary-fixed": "#00201c",
                      "tertiary": "#f9bd22",
                      "secondary-fixed": "#62fae3",
                      "surface-container-low": "#1b1c1c",
                      "surface-container": "#1f2020",
                      "error": "#ffb4ab",
                      "tertiary-fixed": "#ffdf9f",
                      "primary-fixed": "#ffdad7",
                      "on-tertiary-fixed": "#261a00",
                      "background": "#131313",
                      "on-background": "#e4e2e1",
                      "on-secondary": "#003731",
                      "on-error-container": "#ffdad6",
                      "on-secondary-container": "#004d44",
                      "surface-container-highest": "#353535",
                      "outline-variant": "#5b403e",
                      "surface-bright": "#393939",
                      "outline": "#ab8986",
                      "primary-fixed-dim": "#ffb3ad",
                      "on-primary-container": "#5c0008",
                      "primary": "#ffb3ad",
                      "secondary": "#44e2cd",
                      "on-error": "#690005",
                      "on-secondary-fixed-variant": "#005047",
                      "on-primary-fixed-variant": "#930013"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Space Grotesk"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          }
        }
    </script>
</head>
<body class="bg-surface text-on-surface selection:bg-primary selection:text-on-primary">
<div class="min-h-screen flex flex-col justify-center items-center relative overflow-hidden px-4">
<!-- Background Aesthetic Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full opacity-20" style="background-image: radial-gradient(circle at 2px 2px, #353535 1px, transparent 0); background-size: 32px 32px;"></div>
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-on-primary-fixed-variant/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] bg-on-secondary-fixed-variant/10 blur-[100px] rounded-full"></div>
</div>
<!-- Main Shell Container -->
<main class="w-full max-w-md z-10 relative">
<!-- Branding Header -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center mb-6">
<div class="w-12 h-1 bg-primary mb-1"></div>
<span class="font-headline text-3xl font-bold tracking-tighter text-primary mx-4">KINETIC_OBSIDIAN</span>
<div class="w-12 h-1 bg-primary mb-1"></div>
</div>
<h2 class="font-headline text-lg tracking-[0.2em] uppercase text-zinc-500 font-light">The Monolith Infrastructure</h2>
</div>
<!-- Login Card -->
<div class="bg-surface-container-low p-8 rounded-xl relative shadow-2xl overflow-hidden">
<!-- Visual Edge -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50"></div>
<form class="space-y-6">
<!-- Username Field -->
<div class="group">
<label class="block text-xs font-headline uppercase tracking-widest text-zinc-500 mb-2 transition-colors group-focus-within:text-primary" for="username">
                            System Identity / Username
                        </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-600">
<span class="material-symbols-outlined text-[18px]">terminal</span>
</span>
<input class="w-full bg-surface-container-lowest border-none rounded text-on-surface pl-10 py-3 ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 transition-all font-mono text-sm placeholder:text-zinc-700" id="username" name="username" placeholder="root@kinetic" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block text-xs font-headline uppercase tracking-widest text-zinc-500 mb-2 transition-colors group-focus-within:text-primary" for="password">
                            Access Key / Password
                        </label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-600">
<span class="material-symbols-outlined text-[18px]">key</span>
</span>
<input class="w-full bg-surface-container-lowest border-none rounded text-on-surface pl-10 py-3 ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 transition-all font-mono text-sm placeholder:text-zinc-700" id="password" name="password" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-zinc-600 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<!-- Actions Area -->
<div class="pt-4 space-y-4">
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold py-4 rounded-lg flex items-center justify-center gap-2 hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary-container/10" type="submit">
                            SIGN IN
                            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="flex items-center gap-4">
<div class="h-px flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] font-headline uppercase tracking-widest text-zinc-600">Secure Vault</span>
<div class="h-px flex-1 bg-outline-variant/20"></div>
</div>
<!-- Secondary Action: Passkey -->
<button class="w-full bg-surface-container-highest ring-1 ring-outline-variant/30 text-on-surface font-headline font-medium py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-surface-bright active:scale-[0.98] transition-all" type="button">
<span class="material-symbols-outlined text-[20px] text-secondary">fingerprint</span>
                            Sign in with Passkey
                        </button>
</div>
</form>
<!-- Footer Links inside Card -->
<div class="mt-8 pt-6 border-t border-outline-variant/10 flex justify-between items-center text-[11px] font-label tracking-wide uppercase">
<a class="text-zinc-500 hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[14px]">lock_reset</span>
                        Forgot password?
                    </a>
<a class="text-zinc-500 hover:text-secondary transition-colors flex items-center gap-1" href="#">
                        Register Account
                        <span class="material-symbols-outlined text-[14px]">chevron_right</span>
</a>
</div>
</div>
<!-- Global Footer -->
<footer class="mt-12 text-center space-y-4">
<div class="flex justify-center gap-6">
<a class="text-[10px] font-headline uppercase tracking-widest text-zinc-600 hover:text-zinc-300 transition-colors" href="#">Privacy</a>
<a class="text-[10px] font-headline uppercase tracking-widest text-zinc-600 hover:text-zinc-300 transition-colors" href="#">Terms</a>
<a class="text-[10px] font-headline uppercase tracking-widest text-zinc-600 hover:text-zinc-300 transition-colors" href="#">Security</a>
</div>
<p class="text-[9px] font-headline uppercase tracking-[0.2em] text-zinc-700">© 2024 KINETIC MONOLITH • ALL RIGHTS RESERVED</p>
</footer>
</main>
<!-- Status Indicator Bottom Right -->
<div class="fixed bottom-6 right-6 hidden md:flex items-center gap-3 bg-surface-container-low px-4 py-2 rounded-full ring-1 ring-outline-variant/10">
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
<span class="text-[10px] font-mono tracking-tighter text-zinc-500 uppercase">System Status: Online</span>
</div>
</div>
</body></html>
